# Publish the paimon Python binding to PyPI.
# Trigger: push tag only (e.g. v0.1.0).
# Pre-release tags (containing '-') publish to TestPyPI; release tags publish to PyPI.
#
# Token auth: add secrets PYPI_API_TOKEN / TEST_PYPI_API_TOKEN for publishing.

name: Release Python Binding

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          command: sdist
          args: -o dist
          before-script-linux: |
            sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: bindings/python/dist

  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: windows-latest }
          - { os: macos-15-intel, target: "x86_64-apple-darwin" }
          - { os: macos-latest, target: "aarch64-apple-darwin" }
          - { os: ubuntu-latest, target: "x86_64" }
          - { os: ubuntu-latest, target: "aarch64", manylinux: "manylinux_2_28" }
    steps:
      - uses: actions/checkout@v6

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          command: build
          args: --release -o dist
          manylinux: ${{ matrix.manylinux || 'auto' }}
          before-script-linux: |
            if [ "${{ matrix.manylinux }}" = "manylinux_2_28" ]; then
              # manylinux_2_28 uses Ubuntu, install arm64 cross-compile OpenSSL
              dpkg --add-architecture arm64

              # Ubuntu arm64 packages are on ports.ubuntu.com, not archive.ubuntu.com
              # Backup and modify sources.list for multi-arch
              cp /etc/apt/sources.list /etc/apt/sources.list.bak

              # Mark existing sources as amd64 only
              sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list

              # Add arm64 sources pointing to ports.ubuntu.com
              grep '^deb ' /etc/apt/sources.list.bak | \
                sed 's|archive.ubuntu.com/ubuntu|ports.ubuntu.com/ubuntu-ports|' | \
                sed 's|security.ubuntu.com/ubuntu|ports.ubuntu.com/ubuntu-ports|' | \
                sed 's/^deb /deb [arch=arm64] /' >> /etc/apt/sources.list

              apt-get update
              # Install cross-compilation toolchain and OpenSSL for arm64
              apt-get install -y crossbuild-essential-arm64 libssl-dev:arm64

              # Create symlink for OpenSSL headers in compiler's expected location
              mkdir -p /usr/aarch64-unknown-linux-gnu
              ln -sf /usr/aarch64-linux-gnu/include /usr/aarch64-unknown-linux-gnu/include
              ln -sf /usr/aarch64-linux-gnu/lib /usr/aarch64-unknown-linux-gnu/lib
            elif [ "${{ matrix.target }}" = "x86_64" ]; then
              # manylinux auto (CentOS 7) uses OpenSSL 1.0.2, install 1.1
              yum install -y openssl11-devel
              # Create symlinks for pkg-config
              ln -sf /usr/lib64/pkgconfig/openssl11.pc /usr/lib64/pkgconfig/openssl.pc
              ln -sf /usr/lib64/pkgconfig/libssl11.pc /usr/lib64/pkgconfig/libssl.pc
              ln -sf /usr/lib64/pkgconfig/libcrypto11.pc /usr/lib64/pkgconfig/libcrypto.pc
            fi
        env:
          OPENSSL_DIR: ${{ matrix.target == 'aarch64' && '/usr' || '' }}
          OPENSSL_INCLUDE_DIR: ${{ matrix.target == 'aarch64' && '/usr/include' || '' }}
          OPENSSL_LIB_DIR: ${{ matrix.target == 'aarch64' && '/usr/lib/aarch64-linux-gnu' || '' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target || 'native' }}
          path: bindings/python/dist

  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [sdist, wheels]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: bindings/python/dist

      - name: Publish to TestPyPI
        if: contains(github.ref, '-')
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          packages-dir: bindings/python/dist
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Publish to PyPI
        if: ${{ !contains(github.ref, '-') }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          skip-existing: true
          packages-dir: bindings/python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
